spring.application.name=feed-management-service
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://172.28.153.162:3306/feed_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=172.28.153.162
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Fila
rabbitmq.queue.feed=feed.queue
rabbitmq.exchange.feed=feed.exchange
rabbitmq.routing-key.feed=feed.routing-key
